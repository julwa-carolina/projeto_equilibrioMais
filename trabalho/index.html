<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Login</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <main>
        <!-- texto da tela de login -->
        <div id="textoTelaLogin">
            <h1>Menos ultraprocessados, mais saúde</h1>
            <p>Monitore sua alimentação, reduza ultraprocessados e construa hábitos mais saudáveis.</p>
        </div>
        <!-- fim do texto da tela de login -->

        <!-- formulario tela de login -->
        <div class="formulario">
            <form action="" method="get">
                <h1>Login</h1>
                <div class="campo">
                    <input type="text" name="usu" id="iusu" placeholder="Usuario" required>
                    <label for="iusu"></label>
                </div>
                <div class="campo">
                    <input type="password" name="senha" id="isenha" placeholder="Senha" required>
                    <label for="isenha"></label>
                </div>
                <div class="lembrar-esquecer">
                    <a href="#">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="entrar">Entrar</button>
                <div class="cadastrar">
                    <p>Nao possui uma conta? <a href="#">Cadastre-se aqui</a></p>
                </div>
                
                <div class="social-icons">
                            <span>f</span>
                            <span>📷</span>
                            <span>𝕏</span>
                            <span>G</span>
                </div>
            </form>
        </div>
        <div id="imagemLegume"></div>

    </main>
</body>
</html>
