<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equilibrio+</title>
    <link rel="stylesheet" href="estilos/perfil.css">
    <script src="https://kit.fontawesome.com/af61149184.js" crossorigin="anonymous"></script>
</head>

<body>
    <main>
        <div class="container-cadastro">
            <!-- TOPO -->
            <div class="header">
                <h1>Bem vindo(a), Clau!</h1>
                <p>Ter, 12 Abril 2026</p>
            </div>
        
             
            <div class="container-card"> <!-- CARD -->
                <!-- PERFIL -->
                <div class="perfil">
                    <img src="imagens/claudiamaria.png" alt="">
        
                    <div class="info">
                        <h2>Clau</h2>
                        <p>claudiamaria123@gmail.com</p>
                    </div>
                    <button type="submit" class="btn">Salvar <i class="fa-regular fa-floppy-disk" style="color: rgb(255, 255, 255);"></i></button>
                    <button type="submit" class="btn">Editar <i class="fa-solid fa-pen fa-xs" style="color: rgb(255, 255, 255);"></i></button>
                </div>
        
                <!-- FORM -->
                <div class="form">
        
                    <div class="campo">
                        <label for="NomeCompleto">Nome completo</label>
                        <input type="text" id="NomeCompleto" value="Cláudia Maria dos Santos Braga">
                    </div>
        
                    <div class="campo">
                        <label for="NomeUsuario">Nome de usuário</label>
                        <input type="text" id="NomeUsuario" value="Clau">
                    </div>
        
                    <div class="campo">
                        <label for="genero">Gênero</label>
                        <select name="" id="genero">
                            <option value="feminino">Feminino</option>
                            <option value="masculino">Masculino</option>
                            <option value="nao binario">Não-binário</option>
                        </select>
                    </div>
        
                    <div class="campo">
                        <label for="pais">País</label>
                        <select name="" id="pais">
                            <option value="brasil">Brasil</option>
                            <option value="portugal">Portugal</option>
                            <option value="eua">Estados Unidos</option>
                            <option value="franca">Franca</option>
                            <option value="mocambique">Moçambique</option>
                            <option value="angola">Angola</option>
                        </select>
                    </div>
        
                    <div class="campo">
                        <label for="lingua">Língua</label>
                        <select id="lingua">
                            <option value="portugues brasileiro">Português (Brasil)</option>
                            <option value="portugues mocambique">Português (Moçambique)</option>
                            <option value="portugues angola">Português (Angola)</option>
                            <option value="portugues" selected>Português (Portugal)</option> <!-- Opção pré-selecionada -->
                            <option value="ingles eua">inglês (EUA)</option>
                            <option value="ingles uk">inglês (UK)</option>
                        </select>
                    </div>
        
                    <div class="campo">
                        <label for="email">Email</label>
                        <input type="text" id="email" value="claudiamaria123@gmail.com">
                    </div>
        
                    <div class="campo">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" value="(16)99234-5691">
                    </div>
        
                    <div class="campo">
                        <label for="senha">Senha </label> 
                        <input type="password" id="senha" value="*************">
                        <p>Esqueceu a sua senha? Clica <a href="#">aqui</a> para redefinir </p> 
                    </div>
        
                </div> <!-- FIM DO FORM -->
                <button type="submit" class="btn"><a href="home.html">Voltar</a></button>
            </div> <!-- FIM DO CARD -->
        
        </div>
        
    </main>

</body>
</html>
