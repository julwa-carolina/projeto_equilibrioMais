<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Unifit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="image-section">
            <img src="../imagens/vegetables2.png" alt="Imagem de Cadastro" class="main-image" >
            
        </div>

        <div class="form-section">
            <div class="form-header">
                <h1>Criar Conta</h1>
                <p>Já possui uma conta? <a href="#">Entrar</a></p>
            </div>

            <form>
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome completo">
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="exemplo@gmail.com">
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Crie uma senha">
                </div>

                <div class="input-group">
                    <label for="confirmar">Confirmar Senha</label>
                    <input type="password" id="confirmar" placeholder="Repita sua senha">
                </div>

                <button type="submit" class="btn-register">Cadastrar</button>
            </form>
        </div>
    </div>
</body>
</html>
